projects:
- title: "Partinet"
  subtitle: "Cryo-EM particle-picking with AI"
  details: |
    CLI and YOLOv10 integration for PyTorch cryo-EM particle-picking tool developed with researchers.

- title: "XGBoost pipeline parallelisation"
  subtitle: "Nextflow-based HPC hyperparameter tuning pipeline"
  details: |
    Scaled XGBoost pipeline on HPC and added GPU support via RapidsAI (6x faster). Hosted on Seqera Platform.

- title: "AI-powered backyard bird watcher"
  subtitle: "YOLO + OpenCV bird species tracker"
  details: |
    NPU inference with C++ pipeline to track bird species in backyard, with semi-auto data collection and training.

- title: "High-performance improvements to in-house SPH code"
  subtitle: "Accelerating an in-house Fortran SPH code"
  details: |
    MPI parallelisation (3,250x speedup on 4,096 cores) and algorithmic/vectorization upgrades for a further ~8x speedup. Enabled GPU support via C++/Kokkos/Thrust.
